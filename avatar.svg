<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anime-style cartoon avatar of a girl programmer with headphones">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#24405f"/>
      <stop offset="60%" stop-color="#152840"/>
      <stop offset="100%" stop-color="#0d1a2c"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98c5c"/>
      <stop offset="55%" stop-color="#a9714a"/>
      <stop offset="100%" stop-color="#7c4e30"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe7d2"/>
      <stop offset="100%" stop-color="#ffd6ba"/>
    </linearGradient>
    <radialGradient id="irisL" cx="50%" cy="70%" r="65%">
      <stop offset="0%" stop-color="#e8ab5a"/>
      <stop offset="55%" stop-color="#9c6231"/>
      <stop offset="100%" stop-color="#5e3a1e"/>
    </radialGradient>
    <radialGradient id="irisR" cx="50%" cy="70%" r="65%">
      <stop offset="0%" stop-color="#e8ab5a"/>
      <stop offset="55%" stop-color="#9c6231"/>
      <stop offset="100%" stop-color="#5e3a1e"/>
    </radialGradient>
    <linearGradient id="hoodie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33465f"/>
      <stop offset="100%" stop-color="#1f2c3d"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="200" cy="200" r="194"/></clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <rect x="0" y="0" width="400" height="400" fill="url(#bg)"/>

    <!-- soft deco: faint sparkles + code glyph -->
    <g fill="#58a6ff" opacity="0.35">
      <path d="M96 96 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4 z"/>
      <path d="M318 132 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 z"/>
    </g>
    <text x="300" y="300" font-family="monospace" font-size="22" fill="#3fb950" opacity="0.28">&lt;/&gt;</text>
    <!-- electric spark accent -->
    <path d="M328 210 l-11 17 l8 1 l-9 17 l23 -24 l-8 -1 z" fill="#ffd23f" opacity="0.9"/>

    <!-- ===== hair back ===== -->
    <path d="M112 214 C104 132 146 84 200 84 C254 84 296 132 288 214
             C284 258 270 300 258 330 L142 330 C130 300 116 258 112 214 Z" fill="url(#hair)"/>
    <path d="M120 210 C116 150 150 100 150 100 C138 150 140 220 158 300 L142 300 C130 270 122 250 120 210 Z"
          fill="#7c4e30" opacity="0.5"/>
    <path d="M280 210 C284 150 250 100 250 100 C262 150 260 220 242 300 L258 300 C270 270 278 250 280 210 Z"
          fill="#7c4e30" opacity="0.5"/>

    <!-- ===== hoodie / shoulders ===== -->
    <path d="M118 400 C118 336 152 312 200 312 C248 312 282 336 282 400 Z" fill="url(#hoodie)"/>
    <path d="M170 322 C182 336 218 336 230 322 L230 312 L170 312 Z" fill="#26364a"/>
    <line x1="200" y1="320" x2="200" y2="400" stroke="#16202e" stroke-width="3"/>
    <path d="M190 322 q-3 24 -2 40" stroke="#dbe4ee" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M210 322 q3 24 2 40" stroke="#dbe4ee" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- neck -->
    <path d="M182 286 L218 286 L216 314 Q200 324 184 314 Z" fill="#f3c9a8"/>
    <path d="M182 288 q18 14 36 0 l-2 10 q-16 12 -32 0 z" fill="#e8b48c" opacity="0.7"/>

    <!-- ===== face ===== -->
    <path d="M138 196 C138 150 164 128 200 128 C236 128 262 150 262 196
             C262 232 240 262 224 274 C210 284 190 284 176 274 C160 262 138 232 138 196 Z"
          fill="url(#skin)"/>
    <!-- cheek shadow under bangs -->
    <path d="M148 170 C150 200 160 210 176 214 C160 208 156 190 156 172 Z" fill="#f3c3a0" opacity="0.55"/>
    <path d="M252 170 C250 200 240 210 224 214 C240 208 244 190 244 172 Z" fill="#f3c3a0" opacity="0.55"/>

    <!-- ears -->
    <path d="M138 196 q-12 2 -12 14 q0 12 14 12 q-6 -14 -2 -26 z" fill="url(#skin)"/>
    <path d="M262 196 q12 2 12 14 q0 12 -14 12 q6 -14 2 -26 z" fill="url(#skin)"/>

    <!-- blush -->
    <ellipse cx="166" cy="228" rx="13" ry="7" fill="#ffa0a8" opacity="0.55"/>
    <ellipse cx="234" cy="228" rx="13" ry="7" fill="#ffa0a8" opacity="0.55"/>

    <!-- ===== eyes ===== -->
    <!-- brows -->
    <path d="M150 186 q18 -8 34 -2" stroke="#8a5630" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M216 184 q16 -6 34 2" stroke="#8a5630" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- left eye (viewer left) -->
    <g>
      <path d="M150 210 Q168 196 186 208 L186 212 Q168 202 152 214 Z" fill="#4a3326"/>
      <path d="M150 210 Q168 224 188 216 Q186 240 168 244 Q152 240 150 218 Z" fill="#fff"/>
      <ellipse cx="169" cy="222" rx="17" ry="19" fill="url(#irisL)"/>
      <ellipse cx="169" cy="224" rx="8.5" ry="10" fill="#2a1810"/>
      <circle cx="174" cy="216" r="5.5" fill="#fff"/>
      <circle cx="164" cy="230" r="3" fill="#fff" opacity="0.85"/>
      <path d="M150 208 Q168 194 187 206" stroke="#4a3326" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M148 207 q-4 -3 -7 -1" stroke="#4a3326" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- right eye (viewer right) -->
    <g>
      <path d="M214 208 Q232 196 250 210 L248 214 Q232 202 214 212 Z" fill="#4a3326"/>
      <path d="M212 216 Q232 224 250 210 Q250 240 232 244 Q214 240 212 216 Z" fill="#fff"/>
      <ellipse cx="231" cy="222" rx="17" ry="19" fill="url(#irisR)"/>
      <ellipse cx="231" cy="224" rx="8.5" ry="10" fill="#2a1810"/>
      <circle cx="236" cy="216" r="5.5" fill="#fff"/>
      <circle cx="226" cy="230" r="3" fill="#fff" opacity="0.85"/>
      <path d="M213 206 Q232 194 251 208" stroke="#4a3326" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M252 207 q4 -3 7 -1" stroke="#4a3326" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- nose + mouth -->
    <path d="M198 244 q4 3 0 6" stroke="#e2a67f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M188 260 q12 11 24 0" stroke="#b05a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M193 262 q7 5 14 0 z" fill="#c56b58" opacity="0.6"/>

    <!-- ===== bangs (front hair, pointed strands) ===== -->
    <path d="M134 202
             C130 146 162 116 200 116
             C238 116 270 146 266 202
             C262 176 252 168 244 176
             C246 156 234 148 226 160
             C226 140 210 138 206 158
             C200 138 186 142 184 162
             C180 146 166 150 162 172
             C156 158 142 166 134 202 Z" fill="url(#hair)"/>
    <!-- bang highlight streak -->
    <path d="M158 140 C176 126 208 124 232 140 C210 132 182 134 166 150 Z" fill="#d7a06e" opacity="0.7"/>
    <!-- side locks in front of ears -->
    <path d="M136 196 C128 226 132 258 148 282 C138 256 138 224 146 200 Z" fill="#8a5630"/>
    <path d="M264 196 C272 226 268 258 252 282 C262 256 262 224 254 200 Z" fill="#8a5630"/>
    <!-- ahoge -->
    <path d="M200 116 C202 96 214 88 226 78 C214 90 216 104 208 118 Z" fill="#c98c5c"/>

    <!-- ===== headset ===== -->
    <path d="M130 200 C130 132 162 104 200 104 C238 104 270 132 270 200"
          stroke="#243244" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M130 200 C130 132 162 104 200 104 C238 104 270 132 270 200"
          stroke="#3a5170" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <rect x="120" y="188" width="26" height="46" rx="12" fill="#243244"/>
    <rect x="254" y="188" width="26" height="46" rx="12" fill="#243244"/>
    <rect x="125" y="196" width="16" height="30" rx="8" fill="#58a6ff"/>
    <rect x="259" y="196" width="16" height="30" rx="8" fill="#58a6ff"/>
    <rect x="128" y="200" width="6" height="22" rx="3" fill="#bfe0ff" opacity="0.6"/>
    <rect x="262" y="200" width="6" height="22" rx="3" fill="#bfe0ff" opacity="0.6"/>
    <!-- mic boom -->
    <path d="M266 224 C286 240 284 274 250 284" stroke="#243244" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="248" cy="284" r="7" fill="#58a6ff"/>
  </g>

  <!-- circular frame -->
  <circle cx="200" cy="200" r="194" fill="none" stroke="#58a6ff" stroke-width="3" opacity="0.65"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="#0d1117" stroke-width="2" opacity="0.5"/>
</svg>
