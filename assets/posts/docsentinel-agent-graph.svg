<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="gg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="820" height="380" fill="#0d1117"/>

  <!-- nodes -->
  <g fill="#161b22" stroke="#30363d" stroke-width="1.5">
    <rect x="40"  y="60"  width="150" height="56" rx="9"/>
    <rect x="235" y="60"  width="150" height="56" rx="9"/>
    <rect x="235" y="250" width="150" height="56" rx="9"/>
    <rect x="470" y="250" width="150" height="56" rx="9"/>
    <rect x="660" y="250" width="120" height="56" rx="9"/>
    <rect x="660" y="60"  width="120" height="56" rx="9"/>
  </g>
  <g fill="#e6edf3" font-size="13" text-anchor="middle">
    <text x="115" y="93">Intake</text>
    <text x="310" y="93">Threat model</text>
    <text x="310" y="283">Code review</text>
    <text x="545" y="283">Controls</text>
    <text x="720" y="283">Evidence</text>
    <text x="720" y="93">Report</text>
  </g>

  <!-- router diamond -->
  <g>
    <path d="M470 88 L512 60 L554 88 L512 116 z" fill="#161b22" stroke="#e3b341" stroke-width="1.6"/>
    <text x="512" y="84" fill="#e3b341" font-size="11" text-anchor="middle">route</text>
    <text x="512" y="100" fill="#8b949e" font-size="9.5" text-anchor="middle">by risk</text>
  </g>

  <!-- edges -->
  <path d="M190 88 L231 88" stroke="#58a6ff" stroke-width="2" marker-end="url(#g)"/>
  <path d="M385 88 L466 88" stroke="#58a6ff" stroke-width="2" marker-end="url(#g)"/>
  <!-- high risk: route down to code review -->
  <path d="M500 108 Q430 150 360 150 Q310 150 310 246" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#g)"/>
  <text x="360" y="140" fill="#8b949e" font-size="10.5" text-anchor="middle">high risk</text>
  <!-- low risk: route straight to report -->
  <path d="M554 88 L656 88" stroke="#6e7681" stroke-width="1.8" fill="none" marker-end="url(#g)"/>
  <text x="605" y="78" fill="#6e7681" font-size="10.5" text-anchor="middle">low risk</text>
  <!-- code review -> controls -> evidence -->
  <path d="M385 278 L466 278" stroke="#58a6ff" stroke-width="2" marker-end="url(#g)"/>
  <path d="M620 278 L656 278" stroke="#58a6ff" stroke-width="2" marker-end="url(#g)"/>
  <!-- evidence -> report (up) -->
  <path d="M720 250 L720 118" stroke="#58a6ff" stroke-width="2" marker-end="url(#g)"/>
  <!-- loop back: evidence -> threat model on new findings -->
  <path d="M660 262 Q500 202 400 202 L310 202 L310 118"
        stroke="#3fb950" stroke-width="1.8" fill="none" stroke-dasharray="5 4" marker-end="url(#gg)"/>
  <text x="486" y="198" fill="#3fb950" font-size="10.5" text-anchor="middle">new findings → re-model</text>
</svg>
