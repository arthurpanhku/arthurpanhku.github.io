<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="h" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="820" height="360" fill="#0d1117"/>

  <!-- query -->
  <rect x="30" y="150" width="120" height="60" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="185" fill="#e6edf3" font-size="14" text-anchor="middle">query</text>

  <!-- split arrows -->
  <path d="M150 172 Q200 172 200 96 L246 96" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#h)"/>
  <path d="M150 188 Q200 188 200 264 L246 264" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#h)"/>

  <!-- vector retriever -->
  <rect x="250" y="52" width="250" height="90" rx="10" fill="#0f151d" stroke="#3fb950" stroke-width="1.6"/>
  <text x="268" y="76" fill="#3fb950" font-size="13">Vector search · ChromaDB</text>
  <text x="268" y="96" fill="#8b949e" font-size="11.5">"what looks similar?"</text>
  <g fill="#3fb950">
    <circle cx="300" cy="120" r="3"/><circle cx="320" cy="112" r="3"/>
    <circle cx="342" cy="124" r="3"/><circle cx="362" cy="114" r="3"/>
    <circle cx="386" cy="122" r="4.5" stroke="#e6edf3" stroke-width="1.2"/>
    <circle cx="410" cy="112" r="3"/><circle cx="434" cy="123" r="3"/>
  </g>

  <!-- graph retriever -->
  <rect x="250" y="220" width="250" height="90" rx="10" fill="#0f151d" stroke="#d2a8ff" stroke-width="1.6"/>
  <text x="268" y="244" fill="#d2a8ff" font-size="13">Graph retrieval · LightRAG</text>
  <text x="268" y="264" fill="#8b949e" font-size="11.5">"what is it connected to?"</text>
  <g stroke="#d2a8ff" stroke-width="1.3">
    <line x1="315" y1="288" x2="350" y2="278"/>
    <line x1="350" y1="278" x2="385" y2="292"/>
    <line x1="350" y1="278" x2="378" y2="262"/>
    <line x1="385" y1="292" x2="420" y2="282"/>
  </g>
  <g fill="#d2a8ff">
    <circle cx="315" cy="288" r="4"/><circle cx="350" cy="278" r="4"/>
    <circle cx="385" cy="292" r="4"/><circle cx="378" cy="262" r="4"/>
    <circle cx="420" cy="282" r="4"/>
  </g>

  <!-- fuse -->
  <path d="M500 96 Q560 96 560 160 L586 160" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#h)"/>
  <path d="M500 264 Q560 264 560 200 L586 200" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#h)"/>
  <rect x="590" y="140" width="120" height="80" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.6"/>
  <text x="650" y="176" fill="#e6edf3" font-size="13" text-anchor="middle">fuse +</text>
  <text x="650" y="196" fill="#e6edf3" font-size="13" text-anchor="middle">rerank</text>

  <!-- to agent -->
  <path d="M710 180 L748 180" stroke="#58a6ff" stroke-width="2" marker-end="url(#h)"/>
  <text x="758" y="170" fill="#8b949e" font-size="12">context</text>
  <text x="758" y="188" fill="#8b949e" font-size="12">→ agent</text>
</svg>
