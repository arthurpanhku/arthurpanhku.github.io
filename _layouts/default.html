<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>document.documentElement.classList.add('js');</script>
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — Agentic AI × Security{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph / Twitter -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/banner.jpg' | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

<nav class="nav">
  <div class="container">
    <a class="brand" href="{{ '/' | relative_url }}"><span class="p">~/</span>arthur.pan</a>
    <span class="nav-links">
      <a href="{{ '/#projects' | relative_url }}">Projects</a>
      <a href="{{ '/blog/' | relative_url }}">Writing</a>
      <a href="https://github.com/arthurpanhku" target="_blank" rel="noopener">GitHub</a>
    </span>
  </div>
</nav>

{{ content }}

<footer>
  <div class="container">
    <span>© 2026 Arthur Pan · built with Jekyll</span>
    <span>
      <a href="https://github.com/arthurpanhku" target="_blank" rel="noopener">GitHub</a> ·
      <a href="https://www.linkedin.com/in/chao-p-50085a125" target="_blank" rel="noopener">LinkedIn</a> ·
      <a href="mailto:u3638376@connect.hku.hk">Email</a>
    </span>
  </div>
</footer>

<script>
  (function () {
    var els = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window) || !els.length) return;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    els.forEach(function (el) { io.observe(el); });
  })();
</script>
</body>
</html>
